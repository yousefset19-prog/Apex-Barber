<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Confirmed — Apex Barbers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .card { max-width: 480px; }
    .icon { font-size: 3.5rem; margin-bottom: 1.5rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 1rem; }
    p { color: #aaa; line-height: 1.7; margin-bottom: 2rem; }
    a { display: inline-block; background: #EAAB00; color: #000; font-weight: 700; padding: 0.85rem 2rem; border-radius: 4px; text-decoration: none; font-size: 0.9rem; letter-spacing: 0.05em; }
    a:hover { background: #c9940a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Booking Confirmed</h1>
    <p>Your payment was successful. We'll see you at your appointment. A confirmation has been sent to your email.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
